<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowBeauty - Интернет-магазин</title>
<style>
  :root {
    --primary-color: #ff4d8d;
    --bg-color: #faf8f5;
    --text-color: #333;
    --border-color: #eee;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    background-color: var(--bg-color);
    color: var(--text-color);
    line-height: 1.6;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 5%;
    background-color: #fff;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }

  .logo {
    font-size: 1.5rem;
    font-weight: bold;
    color: var(--primary-color);
  }

  nav a {
    margin: 0 15px;
    text-decoration: none;
    color: var(--text-color);
    font-weight: 500;
    cursor: pointer;
  }

  nav a.active, nav a:hover {
    color: var(--primary-color);
    border-bottom: 2px solid var(--primary-color);
  }

  .cart-wrapper {
    font-size: 1.2rem;
    cursor: pointer;
    position: relative;
  }

  #cart-counter {
    background: var(--primary-color);
    color: #fff;
    font-size: 0.8rem;
    padding: 2px 6px;
    border-radius: 50%;
    vertical-align: top;
    margin-left: 5px;
  }

  main {
    padding: 2rem 5%;
    min-height: 70vh;
  }

  .page {
    display: none;
  }

  .page.active {
    display: block;
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }

  .card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    padding: 15px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .card-image-placeholder {
    height: 150px;
    background: #f0f0f0;
    border-radius: 6px;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-style: italic;
  }

  .card h3 {
    font-size: 1.1rem;
    margin: 0 0 10px 0;
  }

  .card p {
    font-size: 1rem;
    font-weight: bold;
    color: var(--primary-color);
    margin-bottom: 15px;
  }

  button {
    background: var(--primary-color);
    color: #fff;
    border: none;
    padding: 8px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.2s;
    margin-top: 5px;
  }

  button:hover {
    background: #e03c74;
  }

  button.view-details {
    background: #666;
    margin-left: 5px;
  }

  button.view-details:hover {
    background: #555;
  }

  .cart-item-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-color);
    align-items: center;
  }

  .checkout-section {
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    margin-top: 20px;
  }

  .checkout-section h3 {
    margin-top: 0;
    color: var(--primary-color);
  }

  input, textarea, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px 0;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }

  footer {
    text-align: center;
    padding: 20px;
    background-color: #333;
    color: #fff;
    margin-top: 30px;
    font-size: 0.9rem;
  }
</style>

<script src="https://www.datadoghq-browser-agent.com/us1/v5/datadog-logs.js" type="text/javascript"></script>

    window.DD_LOGS.init({

</head>
<body>

<header>
  <div class="logo">GlowBeauty</div>
  <nav class="nav-center">
    <a onclick="showPage('home')" class="active">Home</a>
    <a onclick="showPage('catalog')">Catalog</a>
    <a onclick="showPage('cart')">Cart</a>
    <a onclick="showPage('checkout')">Checkout</a>
  </nav>
  <div class="cart-wrapper" onclick="showPage('cart')">
    🛒<span>Cart</span><span id="cart-counter">0</span>
  </div>
</header>

<main>
  <section id="home-page" class="page active">
    <h2>Popular Products</h2>
    <div class="products-grid" id="home-products"></div>
  </section>

  <section id="catalog-page" class="page">
    <h2>Catalog</h2>
    <div class="products-grid" id="catalog-products"></div>
  </section>

  <section id="cart-page" class="page">
    <h2>Ваша корзина</h2>
    <div id="cart-items"></div>
    <div id="cart-total" style="margin-top: 20px; font-weight: bold; font-size: 1.2rem;"></div>
    <br>
    <button onclick="showPage('checkout')" id="checkout-btn" style="padding: 12px 25px; font-size: 1rem;">Перейти к оформлению</button>
  </section>

  <section id="checkout-page" class="page">
    <h2>Оформление заказа</h2>
    <form id="order-form" onsubmit="processOrder(event)">
      <div class="checkout-section">
        <h3>1. Адрес доставки</h3>
        <input type="text" placeholder="Город" required>
        <textarea placeholder="Полный адрес (улица, дом, квартира)" required></textarea>
      </div>

      <div class="checkout-section">
        <h3>2. Способ оплаты</h3>
        <select id="payment-method" required>
          <option value="card">Банковская карта</option>
          <option value="cash">Наличными при получении</option>
          <option value="crypto">Криптовалюта</option>
        </select>
      </div>

      <div class="checkout-section">
        <h3>3. Итоговый заказ</h3>
        <div id="checkout-summary"></div>
      </div>
      
      <button type="submit" style="background: var(--primary-color); color: white; padding: 15px 30px; font-size: 1rem; width: 100%; margin-top: 15px;">Подтвердить и оплатить</button>
    </form>
  </section>
</main>

<footer>
  <p>Contact: info@glowbeauty.com | Follow us on social media</p>
  <p>© 2026 GlowBeauty</p>
</footer>

<script>
// --- База данных товаров ---
const popularProducts = [
  {id:1, name:"Hydrating Face Cream", price:25},
  {id:2, name:"Vitamin C Serum", price:30},
  {id:3, name:"Matte Lipstick", price:15},
  {id:4, name:"Eyeliner Pen", price:12},
  {id:5, name:"Night Repair Cream", price:28},
  {id:6, name:"Face Mask Set", price:20},
  {id:7, name:"Blush Powder", price:18},
  {id:8, name:"Lip Gloss Set", price:22}
];

// --- Корзина и управление страницами ---
let cart = JSON.parse(localStorage.getItem('glow_cart')) || [];

function showPage(pageName) {
  const pages = document.querySelectorAll('.page');
  pages.forEach(p => p.classList.remove('active'));

  const links = document.querySelectorAll('nav a');
  links.forEach(l => l.classList.remove('active'));

  document.getElementById(`${pageName}-page`).classList.add('active');

  // Активная вкладка в меню
  const activeLink = Array.from(links).find(l => l.innerText.toLowerCase() === pageName);
  if (activeLink) {
    activeLink.classList.add('active');
  }

  if (pageName === 'cart') renderCart();
  if (pageName === 'checkout') renderCheckoutSummary();
}

function updateCartCounter() {
  document.getElementById('cart-counter').innerText = cart.length;
}

function addToCart(productId) {
  const product = popularProducts.find(p => p.id === productId);
  if (product) {
    cart.push(product);
    updateCartCounter();
    saveCart();
    alert(`${product.name} добавлен в корзину!`);
    if (window.DD_LOGS) {
      window.DD_LOGS.logger.info('Товар добавлен в корзину', { productId, productName: product.name });
    }
  }
}

function removeFromCart(index) {
  cart.splice(index, 1);
  saveCart();
  updateCartCounter();
  renderCart();
}

function saveCart() {
  localStorage.setItem('glow_cart', JSON.stringify(cart));
}

// --- Отрисовка страниц ---
function renderCart() {
  const container = document.getElementById('cart-items');
  const totalElem = document.getElementById('cart-total');
  const checkoutBtn = document.getElementById('checkout-btn');
  container.innerHTML = '';

  if (cart.length === 0) {
    container.innerHTML = '<p>Ваша корзина пуста.</p>';
    totalElem.innerText = '';
    checkoutBtn.style.display = 'none';
    return;
  }

  let total = 0;
  cart.forEach((item, index) => {
    total += item.price;
    const row = document.createElement('div');
    row.className = 'cart-item-row';
    row.innerHTML = `
      <span>${item.name} &mdash; <strong>$${item.price}</strong></span>
      <button onclick="removeFromCart(${index})" style="background: #a33;">❌ Удалить</button>
    `;
    container.appendChild(row);
  });

  totalElem.innerText = `Итого: $${total}`;
  checkoutBtn.style.display = 'inline-block';
}

function renderCheckoutSummary() {
  const summaryContainer = document.getElementById('checkout-summary');
  summaryContainer.innerHTML = '';

  if (cart.length === 0) {
    summaryContainer.innerHTML = '<p>Корзина пуста. Нечего заказывать.</p>';
    return;
  }

  let total = 0;
  cart.forEach(item => {
    total += item.price;
    const p = document.createElement('p');
    p.innerText = `${item.name} - $${item.price}`;
    summaryContainer.appendChild(p);
  });
  
  const totalP = document.createElement('p');
  totalP.style.fontWeight = 'bold';
  totalP.innerText = `Общая стоимость: $${total}`;
  summaryContainer.appendChild(totalP);
}

function processOrder(event) {
  event.preventDefault();
  alert('Заказ успешно оформлен! Спасибо за покупку.');
  cart = [];
  saveCart();
  updateCartCounter();
  showPage('home');
}

// --- Инициализация товаров на страницах ---
function initProducts() {
  const containers = ['home', 'catalog'];
  containers.forEach(page => {
    const container = document.getElementById(`${page}-products`);
    container.innerHTML = '';
    popularProducts.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-image-placeholder">${p.name}</div>
        <div>
          <h3>${p.name}</h3>
          <p>$${p.price}</p>
        </div>
        <div>
          <button onclick="addToCart(${p.id})">Add to Cart</button>
          <button class="view-details" onclick="alert('Детальнее о ${p.name}')">View Details</button>
        </div>
      `;
      container.appendChild(card);
    });
  });
}

// --- Запуск ---
initProducts();
updateCartCounter();

// Отправка лога в Datadog при загрузке
window.DD_LOGS && window.DD_LOGS.logger.info('Сайт GlowBeauty успешно загружен', {
  userName: 'Вероника',
  productCount: popularProducts.length
});
</script>

</body>
</html>
