<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowBeauty | Premium Store</title>
    <style>
        :root {
            --primary: #ff4d8d;
            --secondary: #2d3436;
            --light: #f9f9f9;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--light);
            overflow-x: hidden;
        }

        /* Navigation */
        header {
            background: var(--white);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }

        .cart-icon-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            position: relative;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background: var(--primary);
            color: white;
            padding: 2px 6px;
            border-radius: 50%;
            font-size: 0.7rem;
        }

        /* Sidebar Cart */
        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 350px;
            height: 100%;
            background: var(--white);
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .cart-sidebar.active { right: 0; }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .close-cart { cursor: pointer; font-size: 1.5rem; }

        .cart-items-list {
            flex: 1;
            overflow-y: auto;
            margin: 20px 0;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #fafafa;
            border-radius: 8px;
        }

        /* Checkout Form inside Cart */
        #checkout-section {
            border-top: 1px solid #eee;
            padding-top: 15px;
            display: none;
        }

        #checkout-section.visible { display: block; }

        /* Products Grid */
        .container { padding: 2rem 5%; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .card:hover { transform: translateY(-5px); }
        .card-img { height: 180px; background: #eee; }
        .card-content { padding: 1.2rem; }
        .price { color: var(--primary); font-weight: bold; font-size: 1.1rem; }

        /* Buttons & Inputs */
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }

        .btn-remove { background: #ff7675; width: auto; padding: 5px 10px; font-size: 0.8rem; }
        
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 900;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<header>
    <div class="logo">GlowBeauty</div>
    <button class="cart-icon-btn" onclick="toggleCart()">
        🛒 <span id="cart-counter" class="cart-badge">0</span>
    </button>
</header>

<div class="container">
    <h2>Popular Products</h2>
    <div id="products-list" class="products-grid"></div>
</div>

<!-- SINGLE SIDEBAR CART -->
<div class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
        <h3>Your Cart</h3>
        <span class="close-cart" onclick="toggleCart()">×</span>
    </div>

    <div id="cart-items-list" class="cart-items-list">
        <!-- Items added dynamically -->
    </div>

    <div id="cart-footer">
        <h4 id="cart-total">Total: $0</h4>
        <button id="go-to-checkout" onclick="showCheckout()">Proceed to Checkout</button>
    </div>

    <!-- INTEGRATED CHECKOUT -->
    <div id="checkout-section">
        <h3>Checkout</h3>
        <form id="order-form" onsubmit="processOrder(event)">
            <input type="text" placeholder="Shipping Address" required>
            <select required>
                <option value="">Select Payment Method</option>
                <option value="card">Credit Card</option>
                <option value="cash">Cash on Delivery</option>
            </select>
            <button type="submit" style="background: #2ecc71; margin-top: 10px;">Place Order</button>
            <button type="button" onclick="hideCheckout()" style="background: #95a5a6; margin-top: 5px;">Back to Cart</button>
        </form>
    </div>
</div>

<script>
    const products = [
        {id:1, name:"Hydrating Cream", price:25, color: "#ffeaa7"},
        {id:2, name:"Vitamin C Serum", price:30, color: "#fab1a0"},
        {id:3, name:"Matte Lipstick", price:15, color: "#ff7675"},
        {id:4, name:"Eyeliner Pen", price:12, color: "#74b9ff"},
        {id:5, name:"Night Repair", price:28, color: "#a29bfe"},
        {id:6, name:"Face Mask Set", price:20, color: "#55efc4"}
    ];

    let cart = JSON.parse(localStorage.getItem('glow_cart_eng')) || [];

    function toggleCart() {
        document.getElementById('cart-sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        hideCheckout(); // Always reset to cart view when opening/closing
    }

    function initProducts() {
        const grid = document.getElementById('products-list');
        products.forEach(p => {
            grid.innerHTML += `
                <div class="card">
                    <div class="card-img" style="background-color: ${p.color}"></div>
                    <div class="card-content">
                        <h3>${p.name}</h3>
                        <p class="price">$${p.price}</p>
                        <button onclick="addToCart(${p.id})">Add to Cart</button>
                    </div>
                </div>
            `;
        });
    }

    function addToCart(id) {
        const product = products.find(p => p.id === id);
        cart.push(product);
        updateCart();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCart();
    }

    function updateCart() {
        localStorage.setItem('glow_cart_eng', JSON.stringify(cart));
        document.getElementById('cart-counter').innerText = cart.length;
        renderCartItems();
    }

    function renderCartItems() {
        const list = document.getElementById('cart-items-list');
        const totalElem = document.getElementById('cart-total');
        const checkoutBtn = document.getElementById('go-to-checkout');
        
        list.innerHTML = cart.length === 0 ? '<p>Your cart is empty</p>' : '';
        let total = 0;

        cart.forEach((item, index) => {
            total += item.price;
            list.innerHTML += `
                <div class="cart-item">
                    <div>
                        <strong>${item.name}</strong><br>
                        <small>$${item.price}</small>
                    </div>
                    <button class="btn-remove" onclick="removeFromCart(${index})">Remove</button>
                </div>
            `;
        });

        totalElem.innerText = `Total: $${total}`;
        checkoutBtn.style.display = cart.length > 0 ? 'block' : 'none';
    }

    function showCheckout() {
        document.getElementById('cart-footer').style.display = 'none';
        document.getElementById('cart-items-list').style.display = 'none';
        document.getElementById('checkout-section').classList.add('visible');
    }

    function hideCheckout() {
        document.getElementById('cart-footer').style.display = 'block';
        document.getElementById('cart-items-list').style.display = 'block';
        document.getElementById('checkout-section').classList.remove('visible');
    }

    function processOrder(e) {
        e.preventDefault();
        alert('Thank you! Your order has been placed successfully.');
        cart = [];
        updateCart();
        toggleCart();
    }

    // Initialize
    initProducts();
    updateCart();
</script>

</body>
</html>
