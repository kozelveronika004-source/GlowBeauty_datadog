<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowBeauty | Premium Store</title>
    <style>
        :root {
            --primary: #ff4d8d;
            --secondary: #2d3436;
            --light: #f9f9f9;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--light);
            color: var(--secondary);
        }

        /* Навигация */
        header {
            background: var(--white);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); }

        nav a {
            text-decoration: none;
            color: var(--secondary);
            margin-left: 20px;
            font-weight: 500;
            cursor: pointer;
        }

        .cart-badge {
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
        }

        /* Сетка товаров */
        .container { padding: 2rem 5%; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-5px); }

        .card-img { height: 200px; background: #eee; }

        .card-content { padding: 1.5rem; text-align: center; }

        .price { color: var(--primary); font-size: 1.2rem; font-weight: bold; }

        /* Кнопки */
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: opacity 0.3s;
            font-weight: 600;
        }

        button:hover { opacity: 0.8; }

        .btn-delete { background: #ff7675; padding: 5px 10px; font-size: 0.8rem; }

        /* Секции (вкладки) */
        .page-section { display: none; animation: fadeIn 0.5s; }
        .page-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Оформление заказа */
        .checkout-form {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 1rem;
            margin-bottom: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">GlowBeauty</div>
    <nav>
        <a onclick="showPage('home')">Главная</a>
        <a onclick="showPage('cart')">Корзина <span id="cart-counter" class="cart-badge">0</span></a>
    </nav>
</header>

<div class="container">
    <!-- ГЛАВНАЯ СТРАНИЦА -->
    <section id="home" class="page-section active">
        <h2>Популярные товары</h2>
        <div id="products-list" class="products-grid"></div>
    </section>

    <!-- КОРЗИНА -->
    <section id="cart" class="page-section">
        <h2>Ваша корзина</h2>
        <div id="cart-items"></div>
        <div style="text-align: right; margin-top: 20px;">
            <h3 id="cart-total">Итого: $0</h3>
            <button onclick="showPage('checkout')">Перейти к оформлению</button>
        </div>
    </section>

    <!-- ОФОРМЛЕНИЕ ЗАКАЗА -->
    <section id="checkout" class="page-section">
        <div class="checkout-form">
            <h2>Оформление заказа</h2>
            <form id="order-form" onsubmit="completeOrder(event)">
                <label>Адрес доставки</label>
                <input type="text" placeholder="Улица, дом, квартира" required>
                
                <label>Способ оплаты</label>
                <select required>
                    <option value="card">Банковская карта</option>
                    <option value="cash">Наличными</option>
                </select>

                <button type="submit" style="width: 100%; margin-top: 20px;">Подтвердить заказ</button>
            </form>
        </div>
    </section>
</div>

<script>
    // 1. Данные
    const products = [
        {id:1, name:"Hydrating Cream", price:25, color: "#ffeaa7"},
        {id:2, name:"Vitamin C Serum", price:30, color: "#fab1a0"},
        {id:3, name:"Matte Lipstick", price:15, color: "#ff7675"},
        {id:4, name:"Eyeliner Pen", price:12, color: "#74b9ff"},
        {id:5, name:"Night Repair", price:28, color: "#a29bfe"},
        {id:6, name:"Face Mask Set", price:20, color: "#55efc4"}
    ];

    let cart = JSON.parse(localStorage.getItem('glow_cart')) || [];

    // 2. Навигация (Вкладки)
    function showPage(pageId) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(pageId === 'cart') renderCart();
    }

    // 3. Логика товаров
    function initProducts() {
        const grid = document.getElementById('products-list');
        products.forEach(p => {
            grid.innerHTML += `
                <div class="card">
                    <div class="card-img" style="background-color: ${p.color}"></div>
                    <div class="card-content">
                        <h3>${p.name}</h3>
                        <p class="price">$${p.price}</p>
                        <button onclick="addToCart(${p.id})">В корзину</button>
                    </div>
                </div>
            `;
        });
    }

    // 4. Логика корзины
    function addToCart(id) {
        const product = products.find(p => p.id === id);
        cart.push(product);
        updateUI();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateUI();
        renderCart();
    }

    function updateUI() {
        localStorage.setItem('glow_cart', JSON.stringify(cart));
        document.getElementById('cart-counter').innerText = cart.length;
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        const totalElem = document.getElementById('cart-total');
        container.innerHTML = cart.length === 0 ? '<p>Корзина пуста</p>' : '';
        
        let total = 0;
        cart.forEach((item, index) => {
            total += item.price;
            container.innerHTML += `
                <div class="cart-item">
                    <span><strong>${item.name}</strong> - $${item.price}</span>
                    <button class="btn-delete" onclick="removeFromCart(${index})">Удалить</button>
                </div>
            `;
        });
        totalElem.innerText = `Итого: $${total}`;
    }

    function completeOrder(e) {
        e.preventDefault();
        alert('Заказ успешно оформлен! Мы свяжемся с вами.');
        cart = [];
        updateUI();
        showPage('home');
    }

    // Запуск
    initProducts();
    updateUI();
</script>

</body>
</html>
