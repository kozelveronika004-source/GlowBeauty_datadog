<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowBeauty - Home</title>
    
    <style>
        :root {
            --primary: #ff85a2;
            --dark: #333;
            --light: #f9f9f9;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: var(--dark); }
        
        /* Header & Nav */
        header { background: #white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); sticky: top; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        nav a { margin: 0 15px; text-decoration: none; color: var(--dark); font-weight: 500; }
        .cart-wrapper { position: relative; cursor: pointer; font-size: 1.4rem; }
        #cart-counter { position: absolute; top: -5px; right: -10px; background: var(--primary); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; }

        /* Products Grid */
        .container { padding: 2rem 5%; }
        .flex { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        
        /* Card Style */
        .card { background: white; border-radius: 10px; overflow: hidden; transition: 0.3s; border: 1px solid #eee; text-align: center; padding-bottom: 15px; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        /* Вместо картинки — звезда */
        .card-image-placeholder { 
            height: 180px; 
            background: #f0f0f0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 3rem; 
            color: var(--primary); 
        }

        .card-content h3 { font-size: 1.1rem; margin: 15px 0 5px; }
        .card-content p { color: #777; margin-bottom: 15px; }
        
        button { 
            background: var(--primary); color: white; border: none; padding: 8px 15px; 
            border-radius: 5px; cursor: pointer; transition: 0.3s; margin: 2px;
        }
        button:hover { background: #ff5c81; }
        button.view-details { background: #eee; color: var(--dark); }

        footer { text-align: center; padding: 2rem; background: #333; color: white; margin-top: 40px; }
    </style>

    <!-- 1. DATADOG SDK -->
    <script src="https://www.datadoghq-browser-agent.com/us1/v5/datadog-logs.js" type="text/javascript"></script>

    <!-- 2. DATADOG INIT -->
    <script>
        window.DD_LOGS && window.DD_LOGS.init({
            clientToken: 'pubf5f92c49b7fcf5ea84e77f7f817f2930',
            site: 'datadoghq.com', 
            forwardErrorsToLogs: true,
            sessionSampleRate: 100,
            service: 'glow-beauty-site',
            env: 'dev'
        });
    </script>
</head>
<body>

<header>
    <div class="logo">GlowBeauty</div>
    <nav class="nav-center">
        <a href="#">Home</a>
        <a href="#">Catalog</a>
        <a href="#">Contact</a>
    </nav>
    <div class="cart-wrapper" onclick="alert('Cart functionality would open here!')">
        ★ <span id="cart-counter">0</span>
    </div>
</header>

<main class="container">
    <section>
        <h2>Popular Products</h2>
        <div class="flex" id="home-products"></div>
    </section>
</main>

<footer>
    <p>Contact: info@glowbeauty.com | Follow us on social media</p>
    <p>© 2026 GlowBeauty</p>
</footer>

<script>
// 1. ДАННЫЕ О ТОВАРАХ
const popularProducts = [
    {id: 1, name: "Hydrating Face Cream", price: 25},
    {id: 2, name: "Vitamin C Serum", price: 30},
    {id: 3, name: "Matte Lipstick", price: 15},
    {id: 4, name: "Eyeliner Pen", price: 12},
    {id: 5, name: "Night Repair Cream", price: 28},
    {id: 6, name: "Face Mask Set", price: 20},
    {id: 7, name: "Blush Powder", price: 18},
    {id: 8, name: "Lip Gloss Set", price: 22}
];

// 2. ЛОГИКА КОРЗИНЫ
let cart = JSON.parse(localStorage.getItem('cart')) || [];

function updateCartCounter() {
    const counter = document.getElementById('cart-counter');
    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    counter.innerText = totalItems;
    localStorage.setItem('cart', JSON.stringify(cart));
}

function addToCart(productId) {
    const product = popularProducts.find(p => p.id === productId);
    const cartItem = cart.find(item => item.id === productId);

    if (cartItem) {
        cartItem.quantity += 1;
    } else {
        cart.push({ ...product, quantity: 1 });
    }

    updateCartCounter();
    
    // Логируем событие в Datadog
    window.DD_LOGS && window.DD_LOGS.logger.info('Product added to cart', {
        productId: productId,
        productName: product.name,
        cartTotal: cart.length
    });

    alert(`${product.name} added to cart!`);
}

// 3. РЕНДЕР КАРТОЧЕК
const homeContainer = document.getElementById('home-products');

function renderProducts() {
    homeContainer.innerHTML = '';
    popularProducts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-image-placeholder">★</div>
            <div class="card-content">
                <h3>${p.name}</h3>
                <p>$${p.price}</p>
                <button onclick="addToCart(${p.id})">Add to Cart</button>
                <button class="view-details" onclick="console.log('View details for ${p.id}')">Details</button>
            </div>
        `;
        homeContainer.appendChild(card);
    });
}

// Инициализация при загрузке
document.addEventListener('DOMContentLoaded', () => {
    renderProducts();
    updateCartCounter();
    
    window.DD_LOGS && window.DD_LOGS.logger.info('Сайт GlowBeauty успешно загружен', { 
        userName: 'Вероника',
        productCount: popularProducts.length 
    });
});
</script>

</body>
</html>
