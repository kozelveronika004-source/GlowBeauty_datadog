<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowBeauty - Home</title>
<link rel="stylesheet" href="style.css">

<!-- 1. ПОДКЛЮЧАЕМ DATADOG (библиотека) -->
<script
  src="https://www.datadoghq-browser-agent.com/us1/v5/datadog-logs.js"
  type="text/javascript">
</script>

<!-- 2. ИНИЦИАЛИЗИРУЕМ DATADOG -->
<script>
  window.DD_LOGS &&
    window.DD_LOGS.init({
      clientToken: 'pubf5f92c49b7fcf5ea84e77f7f817f2930', // <--- ТВОЙ ТОКЕН СЮДА
      site: 'datadoghq.com', 
      forwardErrorsToLogs: true,
      sessionSampleRate: 100,
      service: 'glow-beauty-site', // Название твоего проекта для Datadog
      env: 'dev' // Окружение (разработка)
    });
</script>
</head>
<body>

<header>
  <div class="logo">GlowBeauty</div>
  <nav class="nav-center">
    <a href="index.html" class="active">Home</a>
    <a href="catalog.html">Catalog</a>
    <a href="checkout.html">Checkout</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="cart-wrapper">
    <!-- Заменил эмодзи корзины на звездочку -->
    <a href="cart.html" class="cart-icon">★<span id="cart-counter">0</span></a>
  </div>
</header>

<main class="container">
  <section>
    <h2>Popular Products</h2>
    <div class="flex" id="home-products"></div>
  </section>
</main>

<footer>
  <p>Contact: info@glowbeauty.com | Follow us on social media</p>
  <p>© 2026 GlowBeauty</p>
</footer>

<script src="script.js"></script>
<script>
// Твой существующий скрипт товаров
const popularProducts = [
  {id:1,name:"Hydrating Face Cream",price:25},
  {id:2,name:"Vitamin C Serum",price:30},
  {id:3,name:"Matte Lipstick",price:15},
  {id:4,name:"Eyeliner Pen",price:12},
  {id:5,name:"Night Repair Cream",price:28},
  {id:6,name:"Face Mask Set",price:20},
  {id:7,name:"Blush Powder",price:18},
  {id:8,name:"Lip Gloss Set",price:22}
];

const homeContainer = document.getElementById('home-products');

popularProducts.forEach(p=>{
  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=`
    <!-- Заменил текст в плейсхолдере на звездочку -->
    <div class="card-image-placeholder">★</div>
    <div class="card-content">
      <h3>${p.name}</h3>
      <p>$${p.price}</p>
      <button onclick="addToCart(${p.id})">Add to Cart</button>
      <button class="view-details" onclick="window.location.href='product.html?id=${p.id}'">View Details</button>
    </div>
  `;
  homeContainer.appendChild(card);
});

// 3. ОТПРАВЛЯЕМ ТЕСТОВЫЙ ЛОГ ПРИ ЗАГРУЗКЕ
window.DD_LOGS && window.DD_LOGS.logger.info('Сайт GlowBeauty успешно загружен', { 
  userName: 'Вероника',
  productCount: popularProducts.length 
});
</script>

</body>
</html>
